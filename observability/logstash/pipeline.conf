# Logstash pipeline: receives container logs from Filebeat, parses the app's
# structured JSON (pino) logs, and ships them to Elasticsearch for Kibana.

input {
  beats {
    port => 5044
  }
}

filter {
  # The app emits one JSON object per line to stdout. Parse it.
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  # Promote useful fields and normalise the timestamp.
  if [app] {
    mutate {
      add_field => {
        "service"   => "%{[app][service]}"
        "log_level" => "%{[app][level]}"
      }
    }
    date {
      match  => ["[app][time]", "UNIX_MS", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Keep only production-microservice namespace logs in this pipeline.
  if [kubernetes][namespace] and [kubernetes][namespace] != "production" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:https://elasticsearch:9200}"]
    user  => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl_enabled => true
    index => "microservice-logs-%{+YYYY.MM.dd}"
  }
}
