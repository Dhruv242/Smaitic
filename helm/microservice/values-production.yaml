# Production overrides. Apply with:
#   helm upgrade --install production-microservice helm/microservice \
#     -n production --create-namespace -f helm/microservice/values-production.yaml
replicaCount: 4

autoscaling:
  minReplicas: 4
  maxReplicas: 20

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

env:
  LOG_LEVEL: warn
  SERVICE_NAME: production-microservice
